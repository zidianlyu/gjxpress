# =============================================================================
# GJXpress Backend - Local Docker Compose (production-like)
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gjxpress-api-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
