# =============================================================================
# GJXpress Backend - Production Docker Compose
# For AWS EC2 deployment with Nginx reverse proxy
# =============================================================================

services:
  api:
    image: 919333998053.dkr.ecr.us-west-1.amazonaws.com/gjxpress-backend:latest
    container_name: gjxpress-api
    restart: always
    expose:
      - "3000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  nginx:
    image: nginx:alpine
    container_name: gjxpress-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443" # 新增 443 端口
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 挂载证书 (将宿主机的证书路径映射到容器内)
      - /etc/letsencrypt/live/api.gjxpress.net/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/api.gjxpress.net/privkey.pem:/etc/nginx/certs/privkey.pem:ro
    depends_on:
      api:
        condition: service_healthy
