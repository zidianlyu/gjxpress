# =============================================================================
# GJXpress Backend - Production Docker Compose
# For AWS EC2 deployment with Nginx reverse proxy
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gjxpress-api
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
